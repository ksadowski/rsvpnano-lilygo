[platformio]
default_envs = lilygo_tdisplay_s3_pro

[env]
platform = espressif32@6.3.2
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:tools/pio_set_version.py
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1

[env:lilygo_tdisplay_s3_pro]
board = lilygo-t-display-s3-pro
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:native_test]
platform = native
framework =
test_framework = unity
test_filter = test_pacing
test_build_src = yes
build_src_filter = -<*> +<reader/ReadingLoop.cpp>
build_flags =
  -std=c++17
  -Itest/support
  -Isrc
