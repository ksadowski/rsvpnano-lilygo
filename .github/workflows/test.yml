name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pacing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run pacing tests
        run: pio test -e native_test
